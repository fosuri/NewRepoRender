version: '3.8'
services:
  prometheus:
    image: 'prom/prometheus:latest'
    container_name: prometheus
    restart: unless-stopped
    configs:
      -
        source: prometheus_config
        target: /etc/prometheus/prometheus.yml
    volumes:
      - 'prometheus_data:/prometheus'
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - monitoring
    ports:
      - '9099:9090'
  grafana:
    image: 'grafana/grafana:latest'
    container_name: grafana
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    networks:
      - monitoring
    ports:
      - '3000:3000'
    volumes:
      - 'grafana_data:/var/lib/grafana'
    depends_on:
      - prometheus
  node-exporter:
    image: 'prom/node-exporter:latest'
    container_name: node-exporter
    restart: unless-stopped
    command:
      - '--path.rootfs=/host'
    volumes:
      - '/:/host:ro,rslave'
    networks:
      - monitoring
  cadvisor:
    image: 'gcr.io/cadvisor/cadvisor:latest'
    container_name: cadvisor
    restart: unless-stopped
    privileged: true
    volumes:
      - '/:/rootfs:ro'
      - '/var/run:/var/run:rw'
      - '/sys:/sys:ro'
      - '/var/lib/docker:/var/lib/docker:ro'
    networks:
      - monitoring
    ports:
      - '8083:8080'
  alertmanager:
    image: 'prom/alertmanager:latest'
    container_name: alertmanager
    restart: unless-stopped
    environment:
      - TELEGRAM_BOT_TOKEN=CHANGE_ME
      - TELEGRAM_CHAT_ID=0
    configs:
      -
        source: alertmanager_config
        target: /etc/alertmanager/alertmanager.yml
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--config.expand-env=true'
    networks:
      - monitoring
    ports:
      - '9093:9093'
networks:
  monitoring:
    driver: bridge
volumes:
  prometheus_data: null
  grafana_data: null
configs:
  prometheus_config:
    content: "global:\n  scrape_interval: 15s\n  scrape_timeout: 10s\n  evaluation_interval: 15s\n\nalerting:\n  alertmanagers:\n    - static_configs:\n        - targets: ['alertmanager:9093']\n\nrule_files: []\n\nscrape_configs:\n  - job_name: 'prometheus'\n    static_configs:\n      - targets: ['localhost:9090']\n\n  - job_name: 'node-exporter'\n    static_configs:\n      - targets: ['node-exporter:9100']\n\n  - job_name: 'cadvisor'\n    static_configs:\n      - targets: ['cadvisor:8080']\n"
  alertmanager_config:
    content: "global:\n  resolve_timeout: 5m\n\nroute:\n  receiver: 'telegram'\n\nreceivers:\n  - name: 'telegram'\n    telegram_configs:\n      - bot_token: '${TELEGRAM_BOT_TOKEN}'\n        chat_id: ${TELEGRAM_CHAT_ID}\n        parse_mode: 'HTML'\n        send_resolved: true"
