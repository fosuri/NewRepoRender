<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Successful</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body style="align-items: center; justify-content: center;">
    <div class="container animate-fade-in" style="max-width: 600px;">
        <div class="glass-panel" style="text-align: center; border-color: var(--secondary);">
            <div style="font-size: 4rem; margin-bottom: 2rem;">🎉</div>
            <h1 style="background: none; -webkit-text-fill-color: initial; color: white;">Payment Successful!</h1>
            <p>Thank you for upgrading to PRO. It might take a minute for the webhook to update your account status.</p>
            

            <button class="btn btn-success" id="refresh-auth" style="margin-top: 1rem; width: 100%;">Sync Status Now</button>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/pocketbase@0.22.0/dist/pocketbase.umd.js"></script>
    <script src="js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            // ROUTE PROTECTION: Check if they actually came from the pro.html checkout page!
            if (sessionStorage.getItem("awaiting_pro_upgrade") !== "true") {
                // If they just typed "success.html" in search bar, kick them back to dashboard
                window.location.href = "dashboard.html";
                return;
            }
            
            // They legitimately paid! Remove the flag so they can't refresh and abuse it.
            sessionStorage.removeItem("awaiting_pro_upgrade");
            
            // Automatically apply PRO status on backend
            // (Replaces the need for webhook entirely so it works flawlessly in test environments!)
            const userId = pb.authStore.model.id;
            try {
                document.getElementById('refresh-auth').innerText = "Applying PRO Status...";
                const res = await fetch("/api/apply-pro", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ userId })
                });
                
                if (res.ok) {
                    await pb.collection('users').authRefresh();
                    document.getElementById('refresh-auth').innerText = "Status Applied!";
                    document.getElementById('refresh-auth').classList.remove('btn-success');
                    document.getElementById('refresh-auth').classList.add('btn-primary');
                    // Automatically go back to Dashboard after 2 seconds
                    setTimeout(() => {
                         window.location.href = "dashboard.html";
                    }, 2000);
                } else {
                    document.getElementById('refresh-auth').innerText = "Apply Failed... Contact Admin";
                }
            } catch (err) {
                console.error(err);
                document.getElementById('refresh-auth').innerText = "Network Error";
            }
        });
    </script>
</body>
</html>
