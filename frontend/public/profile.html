<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventory | Profile</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .profile-container {
            display: flex;
            gap: 2rem;
            flex-wrap: wrap;
        }
        .profile-form {
            flex: 1;
            min-width: 300px;
            background: rgba(255, 255, 255, 0.05);
            padding: 1.5rem;
            border-radius: 12px;
            border: 1px solid var(--border-color);
        }
        .profile-devices {
            flex: 2;
            min-width: 300px;
        }
        .avatar-preview {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--primary);
            margin-bottom: 1rem;
            display: block;
        }
    </style>
</head>
<body>
    <div class="container animate-fade-in">
        <div class="glass-panel">
            <div class="nav">
                <h1>My Profile</h1>
                <div class="nav-links">
                    <a href="dashboard.html">Dashboard</a>
                    <a href="admin.html" id="admin-link" class="hidden">Admin Panel</a>
                    <a href="profile.html" class="active">Profile</a>
                    <a href="#" id="logout-btn">Log Out (<span id="user-email"></span>)</a>
                </div>
            </div>

            <div class="profile-container mt-4">
                <div class="profile-form">
                    <h2>Edit Profile</h2>
                    <form id="profile-edit-form" enctype="multipart/form-data">
                        <div class="form-group" style="text-align: center;">
                            <img id="avatar-img" src="https://via.placeholder.com/100" class="avatar-preview" alt="Avatar">
                            <input type="file" id="avatar-input" accept="image/*" style="display: none;">
                            <button type="button" class="btn btn-secondary btn-sm" onclick="document.getElementById('avatar-input').click()">Change Avatar</button>
                        </div>
                        <div class="form-group">
                            <label>Name</label>
                            <input type="text" id="profile-name" placeholder="Enter your full name">
                        </div>
                        <div class="form-group">
                            <label>Email (Read Only)</label>
                            <input type="text" id="profile-email" disabled style="background: rgba(255,255,255,0.1); opacity: 0.7;">
                        </div>
                        <button type="submit" class="btn btn-primary" style="width: 100%;">Save Changes</button>
                        <div id="profile-msg" style="margin-top: 10px; color: var(--success); font-size: 0.9rem; text-align: center;"></div>
                    </form>
                </div>

                <div class="profile-devices">
                    <h2>My Devices</h2>
                    <div class="device-grid" id="my-devices-list">
                        <!-- Devices loaded via JS -->
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/pocketbase@0.22.0/dist/pocketbase.umd.js"></script>
    <script src="js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            initProfile();
        });
    </script>
</body>
</html>
