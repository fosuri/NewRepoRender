<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventory | Register</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container animate-fade-in">
        <div class="glass-panel">
            <h1>Nexus Inventory</h1>
            <p>Create a new account.</p>
            
            <div id="auth-forms" class="auth-forms">
                <div style="flex: 1;">
                    <h2>Register</h2>
                    <form id="register-form">
                        <div class="form-group">
                            <label>Email</label>
                            <input type="email" id="reg-email" required>
                        </div>
                        <div class="form-group">
                            <label>Password</label>
                            <input type="password" id="reg-password" required minlength="8">
                        </div>
                        <div class="form-group">
                            <label>Password Confirm</label>
                            <input type="password" id="reg-password-confirm" required minlength="8">
                        </div>
                        <button type="submit" class="btn btn-success" style="width: 100%; margin-bottom: 1rem;">Create Account</button>
                        <p style="text-align: center; margin-top: 1rem;"><a href="index.html" style="color: var(--secondary);">Already have an account? Log in</a></p>
                    </form>
                </div>
            </div>
            
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/pocketbase@0.22.0/dist/pocketbase.umd.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
