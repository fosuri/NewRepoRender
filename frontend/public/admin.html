<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventory | Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container animate-fade-in">
        <div class="glass-panel">
            <div class="nav">
                <h1>Admin Panel</h1>
                <div class="nav-links">
                    <a href="dashboard.html">Dashboard</a>
                    <a href="admin.html" class="active">Admin Panel</a>
                    <a href="profile.html" id="profile-link">Profile</a>
                    <a href="#" id="logout-btn">Log Out (<span id="user-email"></span>)</a>
                </div>
            </div>

            <div style="background: var(--surface); padding: 1.5rem; border-radius: 12px; margin-bottom: 2rem;">
                <h2>Add New Device</h2>
                <form id="add-device-form" style="display: flex; gap: 1rem; align-items: flex-end;">
                    <div class="form-group" style="margin-bottom: 0; flex: 2;">
                        <label>Device Name</label>
                        <input type="text" id="new-device-name" placeholder="e.g. MacBook Air M2" required>
                    </div>
                    <div class="form-group" style="margin-bottom: 0; flex: 1;">
                        <label>Status</label>
                        <select id="new-device-status">
                            <option value="available">Available</option>
                            <option value="in_use">In Use</option>
                        </select>
                    </div>
                    <button type="submit" class="btn btn-success" style="height: 48px;">Add Device</button>
                </form>
            </div>

            <div class="device-section">
                <h2>Manage Users</h2>
                <table style="width: 100%; border-collapse: collapse; margin-top: 1rem; margin-bottom: 3rem;">
                    <thead>
                        <tr style="text-align: left; border-bottom: 2px solid var(--border-color);">
                            <th style="padding: 1rem;">Email</th>
                            <th style="padding: 1rem;">Role</th>
                            <th style="padding: 1rem;">PRO Status</th>
                            <th style="padding: 1rem;">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="admin-user-list">
                        <!-- Users populated by JS -->
                    </tbody>
                </table>
                
                <h2>Manage Devices</h2>
                <table style="width: 100%; border-collapse: collapse; margin-top: 1rem;">
                    <thead>
                        <tr style="text-align: left; border-bottom: 2px solid var(--border-color);">
                            <th style="padding: 1rem;">Device Name</th>
                            <th style="padding: 1rem;">Status</th>
                            <th style="padding: 1rem;">Current User / Notes</th>
                            <th style="padding: 1rem;">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="admin-device-list">
                        <!-- Devices populated by JS -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/pocketbase@0.22.0/dist/pocketbase.umd.js"></script>
    <script src="js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            initAdmin();
        });
    </script>
</body>
</html>
