<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventory | Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container animate-fade-in">
        <div class="glass-panel">
            <h1>Nexus Inventory</h1>
            <p>A smart device accounting system for modern teams.</p>
            
            <div id="auth-forms" class="auth-forms">
                <!-- Login Form -->
                <div style="flex: 1;">
                    <h2>Sign In</h2>
                    <form id="login-form">
                        <div class="form-group">
                            <label>Email</label>
                            <input type="email" id="login-email" required>
                        </div>
                        <div class="form-group">
                            <label>Password</label>
                            <input type="password" id="login-password" required>
                        </div>
                        <button type="submit" class="btn btn-primary" style="width: 100%; margin-bottom: 1rem;">Log In</button>
                        <p style="text-align: center; margin-top: 1rem;"><a href="register.html" style="color: var(--secondary);">Don't have an account? Register</a></p>
                    </form>
                </div>
            </div>
            
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/pocketbase@0.22.0/dist/pocketbase.umd.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
